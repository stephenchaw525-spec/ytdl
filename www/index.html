<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>YTDL</title>
  <link rel="stylesheet" href="www/style.css" />
</head>
<body>
  <div id="app">

    <!-- HOME -->
    <section id="screen-home" class="screen active col">
      <div style="flex:1"></div>
      <div class="col center">
        <div style="font-size:28px;font-weight:800;opacity:.9">
          <span style="color:#E4344F">Y</span>TDL
        </div>
      </div>
      <div style="flex:1.4"></div>
      <div class="px20">
        <button id="btn-open-search" class="searchbar" style="cursor:pointer;justify-content:center">
          <span class="icon-slot" data-icon="search" data-size="18" data-color="#5A5A63"></span>
          <span class="placeholder-text" style="color:#5A5A63;font-size:14px">Tempel link YouTube di sini…</span>
        </button>
        <div id="clipboard-hint" class="row gap8 hidden" style="margin-top:14px;justify-content:center">
          <span class="icon-slot" data-icon="clipboard" data-size="14" data-color="#E4344F"></span>
          <span class="link-hint">Link terdeteksi di clipboard — <b>tempel?</b></span>
        </div>
      </div>
      <div class="px20" style="padding-top:24px;padding-bottom:8px">
        <button id="btn-view-downloads" class="hist-row" style="border-bottom:none;background:#141418;border:1px solid #232329;border-radius:16px;padding:14px">
          <div class="settings-icon"><span class="icon-slot" data-icon="history" data-size="16" data-color="#E4344F"></span></div>
          <span style="flex:1;font-size:13px;font-weight:600;color:#D8D8DC;text-align:left">Lihat unduhan terakhir</span>
          <span class="icon-slot" data-icon="chevronRight" data-size="16" data-color="#5A5A63"></span>
        </button>
      </div>
    </section>

    <!-- SEARCH -->
    <section id="screen-search" class="screen col">
      <div class="row gap12 px20" style="padding-top:24px;padding-bottom:16px">
        <button id="btn-back-search" class="btn-icon"><span class="icon-slot" data-icon="arrowLeft" data-size="20" data-color="#D8D8DC"></span></button>
        <div class="searchbar" style="border-color:rgba(228,52,79,0.4);padding:10px 16px">
          <span class="icon-slot" data-icon="search" data-size="16" data-color="#5A5A63"></span>
          <input id="search-input" placeholder="Tempel link YouTube di sini…" style="text-align:left" />
          <button id="btn-clear-search" class="btn-icon hidden"><span class="icon-slot" data-icon="x" data-size="15" data-color="#5A5A63"></span></button>
        </div>
      </div>

      <div class="px20" style="padding-bottom:16px">
        <div class="chips-row" id="chips-row"></div>
      </div>

      <div class="px20 scroll">
        <div id="clipboard-row-wrap"></div>
        <div id="history-wrap"></div>
      </div>
    </section>

    <!-- DOWNLOADS -->
    <section id="screen-downloads" class="screen col">
      <div class="px20" style="padding-top:24px;padding-bottom:16px">
        <div style="font-size:19px;font-weight:700">Unduhan</div>
      </div>
      <div id="downloads-empty" class="empty-wrap">
        <div class="empty-icon"></div>
        <div style="font-size:14px;font-weight:600;color:#D8D8DC;margin-bottom:4px">Belum ada unduhan</div>
        <div style="font-size:12px;color:#5A5A63">Tempel link YouTube buat mulai unduh video atau audio.</div>
      </div>
      <div id="downloads-list" class="scroll px20 col gap10 hidden"></div>
    </section>

    <!-- MORE -->
    <section id="screen-more" class="screen col">
      <div class="px20" style="padding-top:24px;padding-bottom:16px">
        <div style="font-size:19px;font-weight:700">Selengkapnya</div>
      </div>
      <div class="px20" id="more-list"></div>
    </section>

    <!-- BOTTOM NAV -->
    <div class="navbar" id="navbar">
      <button class="nav-item" data-screen="home">
        <div class="nav-icon-wrap active" data-icon-wrap="home"><span class="icon-slot" data-icon="home" data-size="19" data-color="#E4344F"></span></div>
        <span class="nav-label active" data-label="home">Beranda</span>
      </button>
      <button class="nav-item" data-screen="downloads">
        <div class="nav-icon-wrap" data-icon-wrap="downloads"><span class="icon-slot" data-icon="download" data-size="19" data-color="#5A5A63"></span></div>
        <span class="nav-label" data-label="downloads">Unduhan</span>
      </button>
      <button class="nav-item" data-screen="more">
        <div class="nav-icon-wrap" data-icon-wrap="more"><span class="icon-slot" data-icon="moreHorizontal" data-size="19" data-color="#5A5A63"></span></div>
        <span class="nav-label" data-label="more">Selengkapnya</span>
      </button>
    </div>

    <!-- DOWNLOAD SHEET (modal) -->
    <div id="sheet-overlay" class="overlay hidden"></div>
    <div id="sheet" class="sheet hidden">
      <div class="sheet-handle"><div></div></div>
      <div id="sheet-loading" class="px20 hidden" style="padding-top:8px;padding-bottom:16px;opacity:.6">
        <div class="row gap12" style="margin-bottom:20px;align-items:flex-start">
          <div class="thumb-lg"></div>
          <div class="col gap8" style="flex:1;padding-top:4px">
            <div class="skel" style="height:10px;width:80px"></div>
            <div class="skel" style="height:14px;width:100%"></div>
            <div class="skel" style="height:14px;width:65%"></div>
          </div>
        </div>
        <div class="skel-box" style="height:40px;border-radius:999px;margin-bottom:20px"></div>
        <div class="skel-box" style="height:64px;margin-bottom:8px"></div>
        <div class="skel-box" style="height:64px;margin-bottom:8px"></div>
        <div class="skel-box" style="height:64px;margin-bottom:8px"></div>
      </div>
      <div id="sheet-error" class="col center hidden" style="padding:40px;gap:6px">
        <div style="font-size:14px;font-weight:700;color:#F5A623" id="sheet-error-text"></div>
        <div style="font-size:12px;color:#5A5A63">Cek link-nya, atau coba lagi.</div>
      </div>
      <div id="sheet-content" class="col hidden" style="flex:1;min-height:0">
        <div class="row px20" style="padding-top:8px;padding-bottom:16px;align-items:flex-start">
          <div class="thumb-lg"></div>
          <div style="flex:1;min-width:0;margin-left:12px">
            <div class="eyebrow accent" style="margin-bottom:4px">Siap diunduh</div>
            <div class="sheet-title" id="sheet-title"></div>
            <div class="sheet-sub" id="sheet-channel"></div>
          </div>
        </div>

        <div class="px20" style="padding-bottom:16px">
          <div class="pill-switch">
            <button class="pill-btn active" id="tab-video">
              <span class="icon-slot" data-icon="video" data-size="14" data-color="#fff"></span> Video
            </button>
            <button class="pill-btn" id="tab-audio">
              <span class="icon-slot" data-icon="music" data-size="14" data-color="#8A8A93"></span> Audio
            </button>
          </div>
        </div>

        <div class="scroll px20">
          <div class="section-title">Pilih kualitas</div>
          <div id="quality-list"></div>

          <div class="folder-row">
            <span class="icon-slot" data-icon="folder" data-size="16" data-color="#8A8A93"></span>
            <div style="flex:1">
              <div class="folder-label">Simpan ke</div>
              <input id="output-path" class="folder-path" />
            </div>
          </div>
        </div>

        <div class="px20" style="padding-top:12px;padding-bottom:20px;border-top:1px solid #1A1A1F">
          <button id="btn-download" class="download-btn">
            <span class="icon-slot" data-icon="download" data-size="18" data-color="#fff"></span>
            <span id="btn-download-text">Unduh</span>
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden">
      <div class="toast-inner">
        <span class="icon-slot" data-icon="checkCircle" data-size="16" data-color="#4ADE9A"></span>
        <span class="toast-text" id="toast-text"></span>
      </div>
    </div>

  </div>

  <script src="www/app.js"></script>
</body>
</html>
