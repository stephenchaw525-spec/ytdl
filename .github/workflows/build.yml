name: Build YTDL Cordova APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Project & Copy Files
        run: |
          cordova create app org.sushitrsh.ytdl "YTDL"
          cd app
          rm -rf www
          cp -r ../www .
          cp ../config.xml .
          cordova platform add android

      - name: Debug Structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== App folder ==="
          ls -la app/
          echo "=== App WWW ==="
          ls -la app/www/
          echo "=== Config ==="
          cat app/config.xml

      - name: Build APK
        run: cd app && cordova build android --debug

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f
          echo "=== Android build output ==="
          ls -R app/platforms/android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ytdl-cordova-debug
          path: "**/*.apk"